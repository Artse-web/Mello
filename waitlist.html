<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta http-equiv="X-UA-Compatible" content="IE=edge">
<title>Mello — Support</title>
<meta name="description" content="Mello — a calmer way to plan school.">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="styles.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Edu+NSW+ACT+Cursive:wght@400..700&family=Google+Sans:ital,opsz,wght@0,17..18,400..700;1,17..18,400..700&display=swap" rel="stylesheet">
<link rel="icon" type="image/png" href="Assets/logo.png">
</head>
<body>

  <div class="layeredTopNav">
    <div class="topnav">
      <div class="topnavInner">
        <div class="logoGroup">
          <img src="Assets/wing.png" class="topwing" alt="">
          <img src="Assets/wing.png" class="topwingother" alt="">
          <p class="MelloTopLogo">Mello</p>
           <p class="MelloTopLogoWait">Waitlist</p>
        </div>
        <div class="spacerBtBar"></div>
        <a href="index.html" class="getApp">Website</a>
      </div>
    </div>
  </div>

  <main>

    <div class="centerwait">
    <div class="Waitlistcontainer">
        <div class="Waitright">
            
        <h1>Join the Mello waitlist now</h1>
        <p>Mello helps students stay organized with class management, to-do lists, schedules, time tables, and customizable study spaces. It's an all-in-one app.
        </p>
         <h3>@Mello All rights reserved.</h3>

        </div>

        <div class="Waitleft">
             <input
              class="Waitlistinput"
                type="email"
                name="email"
                placeholder="Enter your email"
                required
            >
           <input
           class="Waitlistinput"
                type="name"
                name="name"
                placeholder="Enter your name"
                required
            >
            <h2 class="joinwaitlistButt">Join the waitlist →</h2>

        </div>
       

    </div>
    </div>
   
  </main>

</body>
</html>
